### model
model_name_or_path: Qwen/Qwen3-VL-4B-Instruct
image_max_pixels: 100352
video_max_pixels: 100352
video_maxlen: 16
video_fps: 2
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
# finetuning_type: lora
# lora_rank: 64
freeze_vision_tower: true
freeze_multi_modal_projector: false
deepspeed: LLaMA-Factory/examples/deepspeed/ds_z2_config.json  # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]

### dataset
dataset: timethinker_sft_image, timethinker_sft_video
template: qwen3_vl
dataset_dir: LLaMA-Factory/data
media_dir: .
use_fast_tokenizer: true
cutoff_len: 16384
overwrite_cache: false
preprocessing_num_workers: 16
preprocessing_batch_size: 32
max_samples: 50000
tokenized_path: LLaMA-Factory/cache/timethinker_sft_50k

### output
output_dir: models/TimeThinker-4B-SFT-v10-50k
logging_steps: 1
save_steps: 500
save_only_model: false
plot_loss: true
overwrite_output_dir: true
save_total_limit: 5

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 1
dataloader_num_workers: 4
learning_rate: 5.0e-6
weight_decay: 1.0e-6
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.02
bf16: true
ddp_timeout: 180000000
flash_attn: fa2
max_grad_norm: 5.0

### eval
val_size: 0.1
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 500

report_to: none
use_swanlab: true
swanlab_project: TimeThinker
swanlab_run_name: sft_4b-v10-50k
